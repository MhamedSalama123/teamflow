<header class="flex items-center justify-between bg-slate-800 px-6 py-4 text-white">
  <a routerLink="/" class="text-xl font-bold">TeamFlow</a>
  <nav class="flex gap-4">
    @if (auth.isAuthenticated()) {
      <a routerLink="/workspaces" class="hover:underline">Workspaces</a>
      <a routerLink="/projects" class="hover:underline">Projects</a>
      <a routerLink="/notifications" class="flex items-center gap-1 hover:underline">
        Notifications
        @if (unreadCount() > 0) {
          <span class="rounded-full bg-blue-600 px-1.5 text-xs font-semibold text-white">
            {{ unreadCount() }}
          </span>
        }
      </a>
      <a routerLink="/search" class="hover:underline">Search</a>
      <a routerLink="/profile" class="hover:underline">Profile</a>
      <button type="button" class="hover:underline" (click)="auth.logout()">Log out</button>
    } @else {
      <a routerLink="/login" class="hover:underline">Log in</a>
      <a routerLink="/register" class="hover:underline">Register</a>
    }
  </nav>
</header>

<main class="p-6">
  <router-outlet />
</main>
