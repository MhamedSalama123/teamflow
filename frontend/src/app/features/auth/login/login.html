<div class="mx-auto max-w-sm">
  <h1 class="mb-6 text-2xl font-bold text-slate-800">Log in</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>
    @if (error()) {
      <p class="rounded bg-red-50 px-3 py-2 text-sm text-red-700" role="alert">{{ error() }}</p>
    }

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="text-xs text-red-600">Enter a valid email address.</span>
      }
    </label>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="text-xs text-red-600">Password is required.</span>
      }
    </label>

    <a routerLink="/forgot-password" class="-mt-2 self-end text-sm text-blue-600 hover:underline">
      Forgot password?
    </a>

    <button
      type="submit"
      [disabled]="submitting()"
      class="rounded bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 disabled:opacity-50"
    >
      {{ submitting() ? 'Logging in…' : 'Log in' }}
    </button>

    <div class="flex items-center gap-3 text-xs text-slate-400">
      <span class="h-px flex-1 bg-slate-200"></span>
      OR
      <span class="h-px flex-1 bg-slate-200"></span>
    </div>

    <button
      type="button"
      (click)="signInWithGoogle()"
      class="flex items-center justify-center gap-2 rounded border border-slate-300 px-4 py-2 font-medium text-slate-700 hover:bg-slate-50"
    >
      <svg class="h-5 w-5" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <p class="text-sm text-slate-600">
      No account?
      <a routerLink="/register" class="text-blue-600 hover:underline">Register</a>
    </p>
  </form>
</div>
