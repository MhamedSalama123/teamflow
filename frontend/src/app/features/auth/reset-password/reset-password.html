<div class="mx-auto max-w-sm">
  <h1 class="mb-6 text-2xl font-bold text-slate-800">Choose a new password</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>
    @if (error()) {
      <p class="rounded bg-red-50 px-3 py-2 text-sm text-red-700" role="alert">{{ error() }}</p>
    }

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">New password</span>
      <input
        type="password"
        formControlName="newPassword"
        autocomplete="new-password"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.newPassword.touched && form.controls.newPassword.invalid) {
        <span class="text-xs text-red-600">Password must be at least 8 characters.</span>
      }
    </label>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Confirm new password</span>
      <input
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.confirmPassword.touched && form.hasError('mismatch')) {
        <span class="text-xs text-red-600">Passwords do not match.</span>
      }
    </label>

    <button
      type="submit"
      [disabled]="submitting()"
      class="rounded bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 disabled:opacity-50"
    >
      {{ submitting() ? 'Resetting…' : 'Reset password' }}
    </button>

    <a routerLink="/login" class="text-sm text-blue-600 hover:underline">Back to login</a>
  </form>
</div>
