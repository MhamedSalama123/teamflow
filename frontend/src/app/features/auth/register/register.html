<div class="mx-auto max-w-sm">
  <h1 class="mb-6 text-2xl font-bold text-slate-800">Create your account</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>
    @if (error()) {
      <p class="rounded bg-red-50 px-3 py-2 text-sm text-red-700" role="alert">{{ error() }}</p>
    }

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="email"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="text-xs text-red-600">Enter a valid email address.</span>
      }
    </label>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Username</span>
      <input
        type="text"
        formControlName="username"
        autocomplete="username"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.username.touched && form.controls.username.invalid) {
        <span class="text-xs text-red-600">Username must be between 3 and 100 characters.</span>
      }
    </label>

    <label class="flex flex-col gap-1">
      <span class="text-sm font-medium text-slate-700">Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="new-password"
        class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="text-xs text-red-600">Password must be at least 8 characters.</span>
      }
    </label>

    <button
      type="submit"
      [disabled]="submitting()"
      class="rounded bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 disabled:opacity-50"
    >
      {{ submitting() ? 'Creating account…' : 'Register' }}
    </button>

    <p class="text-sm text-slate-600">
      Already have an account?
      <a routerLink="/login" class="text-blue-600 hover:underline">Log in</a>
    </p>
  </form>
</div>
