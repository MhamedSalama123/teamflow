<div class="mx-auto max-w-sm">
  <h1 class="mb-2 text-2xl font-bold text-slate-800">Forgot your password?</h1>

  @if (submitted()) {
    <p class="rounded bg-green-50 px-3 py-2 text-sm text-green-700">
      If an account exists for that email, a reset link is on its way. Check your inbox.
    </p>
    <a routerLink="/login" class="mt-4 inline-block text-sm text-blue-600 hover:underline">
      Back to login
    </a>
  } @else {
    <p class="mb-6 text-sm text-slate-600">
      Enter your email and we'll send you a link to reset your password.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>
      <label class="flex flex-col gap-1">
        <span class="text-sm font-medium text-slate-700">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          class="rounded border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="text-xs text-red-600">Enter a valid email address.</span>
        }
      </label>

      <button
        type="submit"
        [disabled]="submitting()"
        class="rounded bg-blue-600 px-4 py-2 font-medium text-white hover:bg-blue-700 disabled:opacity-50"
      >
        {{ submitting() ? 'Sending…' : 'Send reset link' }}
      </button>

      <a routerLink="/login" class="text-sm text-blue-600 hover:underline">Back to login</a>
    </form>
  }
</div>
