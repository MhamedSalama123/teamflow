spring.application.name=backend

# JWT configuration (override the secret in each environment; must be >= 32 bytes for HS256)
jwt.secret=${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Google OAuth2 client (real credentials come from env vars; the dummy defaults only keep
# the ClientRegistrationRepository bean available so the context loads in dev/test).
# redirect-uri must match the Angular callback route and the URI registered in Google Cloud.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:4200/auth/google/callback}

# Base URL of the Angular app, used to build links (e.g. password reset) in emails.
app.frontend-base-url=${APP_FRONTEND_BASE_URL:http://localhost:4200}

# Where uploaded profile photos and chat attachments are stored on disk, and the upload size limit
# (chat attachments are capped at 10 MB in FileStorageService).
app.upload-dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail (SMTP). Values come from the .env vars; when the host is blank the EmailService
# logs the code instead of sending, so the app still runs without a mail server.
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS:true}
