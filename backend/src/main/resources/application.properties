spring.application.name=backend

# JWT configuration (override the secret in each environment; must be >= 32 bytes for HS256)
jwt.secret=${JWT_SECRET:change-me-in-production-this-is-a-dev-only-secret-key}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Google OAuth2 client (real credentials come from env vars; the dummy defaults only keep
# the ClientRegistrationRepository bean available so the context loads in dev/test).
# redirect-uri must match the Angular callback route and the URI registered in Google Cloud.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:4200/auth/google/callback}
